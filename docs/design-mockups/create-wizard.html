<h2>创建向导：分步收集小说基本信息</h2>
<p class="subtitle">点击"创建新小说"后进入，3步完成项目初始化</p>

<div class="mockup">
  <div class="mockup-header">创建向导</div>
  <div class="mockup-body" style="font-size:12px;">
    <!-- 向导弹窗 -->
    <div style="background:#1a1a2e;border-radius:8px;border:1px solid #333;max-width:520px;margin:0 auto;">

      <!-- 步骤指示器 -->
      <div style="padding:16px 20px;border-bottom:1px solid #333;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <div style="background:#2d5a2d;color:#6bcf6b;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;">1</div>
          <div style="color:#6bcf6b;font-weight:bold;font-size:13px;">基本信息</div>
          <div style="flex:1;height:1px;background:#333;"></div>
          <div style="background:#333;color:#888;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;">2</div>
          <div style="color:#888;font-size:13px;">主角设定</div>
          <div style="flex:1;height:1px;background:#333;"></div>
          <div style="background:#333;color:#888;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;">3</div>
          <div style="color:#888;font-size:13px;">确认创建</div>
        </div>
      </div>

      <!-- 第1步内容 -->
      <div style="padding:20px;">
        <h3 style="margin-bottom:16px;">你的小说叫什么？</h3>

        <div style="margin-bottom:16px;">
          <label style="display:block;color:#888;font-size:11px;margin-bottom:4px;">书名 *</label>
          <input class="mock-input" style="width:100%;padding:8px 12px;background:#0d0d1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:13px;" placeholder="例如：修仙归来当奶爸" value="我在异界开挂修仙">
        </div>

        <div style="margin-bottom:16px;">
          <label style="display:block;color:#888;font-size:11px;margin-bottom:4px;">题材类型 *（可多选）</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            <span style="background:#2d5a2d;color:#6bcf6b;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">修仙 ✓</span>
            <span style="background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">都市</span>
            <span style="background:#2d5a2d;color:#6bcf6b;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">系统流 ✓</span>
            <span style="background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">古言</span>
            <span style="background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">规则怪谈</span>
            <span style="background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">悬疑推理</span>
            <span style="background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">高武</span>
            <span style="background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;">现实题材</span>
          </div>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:16px;">
          <div style="flex:1;">
            <label style="display:block;color:#888;font-size:11px;margin-bottom:4px;">目标字数</label>
            <input class="mock-input" style="width:100%;padding:8px 12px;background:#0d0d1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:13px;" value="2,000,000">
          </div>
          <div style="flex:1;">
            <label style="display:block;color:#888;font-size:11px;margin-bottom:4px;">目标章节数</label>
            <input class="mock-input" style="width:100%;padding:8px 12px;background:#0d0d1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:13px;" value="600">
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <label style="display:block;color:#888;font-size:11px;margin-bottom:4px;">核心卖点（可选）</label>
          <input class="mock-input" style="width:100%;padding:8px 12px;background:#0d0d1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:13px;" placeholder="用1-3句话描述你的小说最吸引人的地方">
        </div>
      </div>

      <!-- 底部按钮 -->
      <div style="padding:12px 20px;border-top:1px solid #333;display:flex;justify-content:space-between;">
        <button class="mock-button" style="background:#333;color:#888;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;">取消</button>
        <button class="mock-button" style="background:#2d5a2d;color:#6bcf6b;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-weight:bold;">下一步 →</button>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px;padding:8px;background:#1a2a1a;border-radius:6px;font-size:12px;color:#6bcf6b;">
  <strong>设计要点：</strong>
  <ul style="margin:4px 0 0 16px;color:#aaa;">
    <li>3步向导，每步信息量少，不吓人</li>
    <li>题材用标签选择而非下拉框，更直观，支持多选组合</li>
    <li>目标字数/章节数有默认值，用户可以不改</li>
    <li>核心卖点是可选的，不填也能创建</li>
  </ul>
</div>
